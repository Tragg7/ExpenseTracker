<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content=""/>
    <meta name="author" content=""/>
    <title>Обновить трату</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css"/>
    <link href="https://fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic" rel="stylesheet"
          type="text/css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body id="page-top">
<div th:replace="fragments/navbar :: navbar('no', 'no', 'no', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes')"></div>
<div class="container mt-3 pt-3">
    <h2 class="text-center mb-5 mt-4">
        Обновить трату
    </h2>
    <div class="row justify-content-center mt-4">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    <i class="fa-solid fa-wallet"></i>
                    Обновить трату
                </div>
                <div class="card-body">
                    <form th:action="@{/submitUpdate(expId=${expenseId})}"
                          th:object="${expense}"
                          method="post">
                        <div class="mb-3">
                            <input type="hidden"
                                   th:field="*{category}">
                            <label class="form-label">Категория</label>
                            <input type="text"
                                   class="form-control"
                                   th:value="${expense.category}"
                                   readonly>
                        </div>
                        <div class="mb-3">
                            <label for="amount" class="form-label">
                                Сумма
                            </label>
                            <input type="number"
                                   class="form-control"
                                   id="amount"
                                   th:field="*{amount}"
                                   required>
                        </div>
                        <div class="mb-3">
                            <label for="dateTime" class="form-label">
                                Дата и время
                            </label>
                            <input type="datetime-local"
                                   id="dateTime"
                                   class="form-control"
                                   th:field="*{dateTime}"
                                   required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">
                                Описание
                            </label>
                            <textarea class="form-control"
                                      id="description"
                                      rows="3"
                                      th:field="*{description}">
                        </textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            Обновить трату
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
