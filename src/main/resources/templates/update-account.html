<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать счёт</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-card {
            border-left: 4px solid #3498db;
            border-radius: 12px;
        }
        .form-card .card-header {
            background-color: #ebf5fb;
            border-bottom: 1px solid #d4e6f1;
            color: #2874a6;
        }
        .form-label {
            font-weight: 500;
            color: #2c3e50;
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #dee2e6;
            transition: border-color 0.2s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
        }
        .form-check-input:checked {
            background-color: #3498db;
            border-color: #3498db;
        }
        .btn-submit {
            background-color: #3498db;
            border-color: #3498db;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-submit:hover {
            background-color: #2874a6;
            border-color: #2874a6;
            transform: translateY(-1px);
        }
        .account-type-info {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body id="page-top">
<div th:replace="fragments/navbar :: navbar('no', 'no', 'no', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes')"></div>

<div class="container mt-5 pt-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card form-card shadow-sm">
                <div class="card-header py-3">
                    <h4 class="mb-0">
                        <i class="fa-solid fa-building-columns me-2"></i>
                        Редактировать счёт
                    </h4>
                </div>
                <div class="card-body p-4">

                    <form th:action="@{/accounts/submitUpdate}" th:object="${account}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Название счёта</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Тип счёта</label>
                            <select class="form-select" th:field="*{type}" required>
                                <option value="CASH">💵 Наличные</option>
                                <option value="CARD">💳 Банковская карта</option>
                                <option value="SAVINGS">🏦 Сберегательный счёт</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Валюта</label>
                            <select class="form-select" th:field="*{currency}" required>
                                <option value="RUB">🇷🇺 Российский рубль (RUB)</option>
                                <option value="USD">🇺🇸 Доллар США (USD)</option>
                                <option value="EUR">🇪🇺 Евро (EUR)</option>
                                <option value="GBP">🇬🇧 Британский фунт (GBP)</option>
                                <option value="CNY">🇨🇳 Китайский юань (CNY)</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Описание</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"
                                      placeholder="Необязательное описание счёта"></textarea>
                        </div>

                        <div class="mb-4">
                            <div class="form-check form-switch">
                                <input type="checkbox" class="form-check-input" id="isActive" th:field="*{active}">
                                <label class="form-check-label fw-bold" for="isActive">
                                    Активный счёт
                                </label>
                            </div>
                            <small class="text-muted">Неактивные счета не отображаются в списках выбора</small>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-submit text-white">
                                <i class="fa-solid fa-check me-2"></i>Сохранить изменения
                            </button>
                            <a th:href="@{/accounts/list}" class="btn btn-outline-secondary">
                                <i class="fa-solid fa-arrow-left me-2"></i>Отмена
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
