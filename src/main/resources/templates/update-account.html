<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать счёт</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body id="page-top">
<div th:replace="fragments/navbar :: navbar('no', 'no', 'no', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes')"></div>

<div class="container mt-3 pt-3">
    <h2 class="text-center mb-5 mt-4">
        Редактировать счёт
    </h2>
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    <i class="fa-solid fa-pen"></i>
                    Редактирование счёта
                </div>
                <div class="card-body">
                    <form th:action="@{/accounts/submitUpdate}" th:object="${account}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="name" class="form-label">Название счёта</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" required>
                        </div>

                        <div class="mb-3">
                            <label for="type" class="form-label">Тип счёта</label>
                            <select class="form-select" id="type" th:field="*{type}" required>
                                <option value="CASH">Наличные</option>
                                <option value="CARD">Банковская карта</option>
                                <option value="SAVINGS">Сберегательный счёт</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="currency" class="form-label">Валюта</label>
                            <select class="form-select" id="currency" th:field="*{currency}" required>
                                <option value="RUB">Российский рубль (RUB)</option>
                                <option value="USD">Доллар США (USD)</option>
                                <option value="EUR">Евро (EUR)</option>
                                <option value="GBP">Британский фунт (GBP)</option>
                                <option value="CNY">Китайский юань (CNY)</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Описание</label>
                            <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="isActive" th:field="*{active}">
                            <label class="form-check-label" for="isActive">Активный счёт</label>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                            <a th:href="@{/accounts/list}" class="btn btn-danger">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
