<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>Траты</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .expense-card {
            border-left: 4px solid #e74c3c;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .expense-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        }
        .expense-card .card-header {
            background-color: #fff5f5;
            border-bottom: 1px solid #fde2e2;
            color: #c0392b;
        }
        .amount-block {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 10px 15px;
            margin: 10px 0;
        }
        .amount-main {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c3e50;
        }
        .amount-converted {
            font-size: 0.85rem;
            color: #7f8c8d;
        }
        .info-label {
            color: #7f8c8d;
            font-size: 0.85rem;
            margin-bottom: 2px;
        }
        .info-value {
            color: #2c3e50;
            font-weight: 500;
        }
        .filter-card {
            border: none;
            border-radius: 12px;
        }
    </style>
</head>
<body id="page-top">
<div th:replace="fragments/navbar :: navbar('no', 'no', 'no', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes')"></div>

<div class="container mt-3 pt-3">
    <h2 class="text-center mb-5 mt-4">
        <i class="fa-solid fa-receipt text-danger"></i> Траты
    </h2>

    <div class="row justify-content-center mb-4">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card filter-card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center"
                     id="filterHeader" style="cursor: pointer;">
                    <span><i class="fa-solid fa-filter me-2"></i>Фильтры</span>
                    <i class="fa-solid fa-chevron-down" id="filterArrow"></i>
                </div>
                <div class="card-body" id="filterBody">
                    <form th:action="@{/processFilter}" th:object="${filter}" method="post">
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label class="form-label small text-muted">Категория</label>
                                <select class="form-select" th:field="*{category}">
                                    <option value="all">Все категории</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.name}"
                                            th:text="${cat.name}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label small text-muted">Счёт</label>
                                <select class="form-select" th:field="*{accountId}">
                                    <option value="">Все счета</option>
                                    <option th:each="account : ${accounts}"
                                            th:value="${account.id}"
                                            th:text="${account.name + ' (' + #numbers.formatDecimal(account.balance, 1, 2) + ' ' + account.currency + ')'}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-6 col-md-3">
                                <label class="form-label small text-muted">Сумма от</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{from}">
                            </div>
                            <div class="col-6 col-md-3">
                                <label class="form-label small text-muted">Сумма до</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{to}">
                            </div>
                            <div class="col-6 col-md-3">
                                <label class="form-label small text-muted">Месяц</label>
                                <select class="form-select" th:field="*{month}">
                                    <option value="all">За весь год</option>
                                    <option th:each="month : ${months}"
                                            th:value="${month.value}"
                                            th:text="${month.name}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-6 col-md-3">
                                <label class="form-label small text-muted">Год</label>
                                <select class="form-select" th:field="*{year}">
                                    <option value="all">Все годы</option>
                                    <option th:each="year : ${years}"
                                            th:value="${year}"
                                            th:text="${year}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-12 col-md-6 d-flex align-items-end">
                                <button type="submit" class="btn btn-danger w-100">
                                    <i class="fa-solid fa-magnifying-glass"></i> Применить
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(expenseList)}" class="card shadow-sm border-0 text-center py-5">
        <div class="card-body">
            <i class="fa-solid fa-receipt fa-3x text-muted mb-3"></i>
            <h5 class="text-muted">Трат не найдено</h5>
            <p class="text-muted">Добавьте первую трату, чтобы начать отслеживать расходы</p>
            <a th:href="@{/showAdd}" class="btn btn-danger">
                <i class="fa-solid fa-plus"></i> Добавить трату
            </a>
        </div>
    </div>

    <div class="row">
        <div class="col-12 col-sm-6 col-lg-4 mb-4" th:each="exp : ${expenseList}">
            <div class="card expense-card shadow-sm h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <div>
                        <i class="fa-solid fa-cart-shopping me-2"></i>
                        <strong th:text="${exp.categoryName}">Категория</strong>
                    </div>
                    <small class="text-muted" th:text="${exp.date}">Дата</small>
                </div>
                <div class="card-body">
                    <div class="amount-block text-center">
                        <div class="amount-main">
                            <span th:text="${#numbers.formatDecimal(exp.amount, 1, 2)}">0.00</span>
                            <span class="text-muted" style="font-size: 1rem;" th:text="${exp.accountCurrency}">RUB</span>
                        </div>
                        <div class="amount-converted" th:if="${exp.accountCurrency != 'RUB'}">
                            ≈ <span th:text="${#numbers.formatDecimal(exp.amountInRub, 1, 2)}">0.00</span> ₽
                        </div>
                    </div>

                    <div class="mb-2">
                        <div class="info-label">Счёт</div>
                        <div class="info-value">
                            <i class="fa-solid fa-wallet me-1 text-muted"></i>
                            <span th:text="${exp.accountName}">Счёт</span>
                        </div>
                    </div>
                    <div class="mb-2">
                        <div class="info-label">Время</div>
                        <div class="info-value" th:text="${exp.time}">Время</div>
                    </div>
                    <div class="mb-2" th:if="${exp.description != null and !exp.description.isEmpty()}">
                        <div class="info-label">Описание</div>
                        <div class="info-value" th:text="${exp.description}">Описание</div>
                    </div>
                </div>
                <div class="card-footer bg-white border-0">
                    <div class="d-flex gap-2">
                        <a th:href="@{/showUpdate(expId=${exp.id})}"
                           class="btn btn-warning btn-sm flex-fill">
                            <i class="fas fa-edit"></i> Изменить
                        </a>
                        <a th:href="@{/delete(expId=${exp.id})}"
                           class="btn btn-danger btn-sm flex-fill"
                           onclick="return confirm('Вы уверены, что хотите удалить эту трату?')">
                            <i class="fas fa-trash"></i> Удалить
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const header = document.getElementById("filterHeader");
        const body = document.getElementById("filterBody");
        const arrow = document.getElementById("filterArrow");

        const isCollapsed = localStorage.getItem('expenseFilterCollapsed') === 'true';
        if (isCollapsed) {
            body.style.display = 'none';
            arrow.classList.add("fa-rotate-180");
        }

        header.addEventListener("click", function () {
            if (body.style.display === 'none') {
                body.style.display = 'block';
                arrow.classList.remove("fa-rotate-180");
                localStorage.setItem('expenseFilterCollapsed', 'false');
            } else {
                body.style.display = 'none';
                arrow.classList.add("fa-rotate-180");
                localStorage.setItem('expenseFilterCollapsed', 'true');
            }
        });
    });
</script>
</body>
</html>
