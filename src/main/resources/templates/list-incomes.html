<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content=""/>
    <meta name="author" content=""/>
    <title>Доходы</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css"/>
    <link href="https://fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic" rel="stylesheet"
          type="text/css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .hash {
            color: #008000;
            font-size: 20px;
            font-weight: bold;
        }
        .MY {
            margin-top: 34px;
            padding-left: 19px;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var toggleFormBtn = document.getElementById("toggleFormBtn");
            var filterForm = document.getElementById("filterForm");

            toggleFormBtn.addEventListener("click", function () {
                if (filterForm.style.display === "none" || filterForm.style.display === "") {
                    filterForm.style.display = "block";
                } else {
                    filterForm.style.display = "none";
                }
            });
        });
    </script>
</head>
<body id="page-top">
<div th:replace="fragments/navbar :: navbar('no', 'no', 'no', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes')"></div>

<section class="page-section mb-0 portfolio" id="about">
    <div class="container">
        <h4 class="page-section-heading text-center text-uppercase" style="margin-top: 30px;">Доходы</h4>

        <div class="d-flex flex-column justify-content-start text-left gap-10">
            <div class="row">
                <div class="col-md-6 offset-md-3">
                    <button class="btn btn-secondary" id="toggleFormBtn" style="margin-left: 33%;margin-bottom: 28px;width: 35%;">
                        <i class="fa-solid fa-filter"></i>
                        Фильтры
                    </button>
                    <div id="filterForm" style="display: none;margin-left: 14%;width: 127%;">
                        <form th:action="@{/income/processFilter}" th:object="${filter}" method="post">
                            <div class="form-group">
                                <label for="incomeCategory"><h6>Категория доходов: </h6></label>
                                <select id="incomeCategory" th:field="*{category}" style="width: 32%; margin-left: 20px;">
                                    <option value="all">Все</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.name}"
                                            th:text="${cat.name}">
                                    </option>
                                </select>
                            </div>
                            <br>
                            <div class="form-group row">
                                <div class="col-md-2 MY"><h6>Диапазон доходов(в ₽):</h6></div>
                                <div class="col-md-2">
                                    <label for="from" style="margin-left: 8px;"><h6>С</h6></label>
                                    <input type="number" class="form-control" id="from" th:field="*{from}">
                                </div>
                                <div class="col-md-2">
                                    <label for="to" style="margin-left: 8px;"><h6>По</h6></label>
                                    <input type="number" class="form-control" id="to" th:field="*{to}">
                                </div>
                            </div>
                            <br>
                            <div class="form-group row">
                                <div class="col-md-2 MY"><h6>Месяц: </h6></div>
                                <div class="col-md-2">
                                    <label for="months"></label>
                                    <select id="months" name="months" class="form-control" style="width: 100%;"
                                            th:field="*{month}">
                                        <option value="all">За год</option>
                                        <option value="01">Январь</option>
                                        <option value="02">Февраль</option>
                                        <option value="03">Март</option>
                                        <option value="04">Апрель</option>
                                        <option value="05">Май</option>
                                        <option value="06">Июнь</option>
                                        <option value="07">Июль</option>
                                        <option value="08">Август</option>
                                        <option value="09">Сентябрь</option>
                                        <option value="10">Октябрь</option>
                                        <option value="11">Ноябрь</option>
                                        <option value="12">Декабрь</option>
                                    </select>
                                </div>

                                <div class="col-md-2 MY"><h6>Год: </h6></div>
                                <div class="col-md-2">
                                    <label for="years"></label>
                                    <select id="years" name="years" class="form-control"
                                            style="width: 100%;margin-left:-27px;" th:field="*{year}">
                                        <option value="all">Все</option>
                                        <option value="2025">2025</option>
                                        <option value="2026">2026</option>
                                        <option value="2027">2027</option>
                                        <option value="2028">2028</option>
                                    </select>
                                </div>
                            </div>
                            <br>
                            <input type="submit" class="btn btn-success" value="Apply" style="width: 28%;margin-left: 15%;"/>
                            <br>
                            <br>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 col-sm-6 col-lg-4 py-2" th:each="inc : ${incomeList}">
                <div class="card h-100 border-success">
                    <div class="card-body">
                        <span class="hash">Категория: </span>
                        <span class="card-text" th:text="${inc.categoryName}"></span><br>
                        <span class="hash">Стоимость: </span>
                        <span class="card-text" th:text="${inc.amount}"></span>
                        ₽<br>
                        <span class="hash">Дата: </span><span class="card-text" th:text="${inc.date}"></span><br>
                        <span class="hash">Время: </span><span class="card-text" th:text="${inc.time}"></span><br>
                        <span class="hash">Описание: </span>
                        <span class="card-text" th:text="${inc.description}"></span>
                        <br>
                        <div class="text-center" style="margin-top:28px;">
                            <a th:href="@{/income/showUpdate(incId=${inc.id})}" class="btn btn-info border-light"
                               style="background: #1abc9c; color: white;">Обновить</a>
                            <a th:href="@{/income/delete(incId=${inc.id})}" class="btn btn-danger"
                               onclick="if(!(confirm('Вы уверены что хотите удалить доход?'))) return false">Удалить</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
