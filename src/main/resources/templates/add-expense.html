<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>Добавить трату</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-card {
            border-left: 4px solid #e74c3c;
            border-radius: 12px;
        }
        .form-card .card-header {
            background-color: #fff5f5;
            border-bottom: 1px solid #fde2e2;
            color: #c0392b;
        }
        .form-label {
            font-weight: 500;
            color: #2c3e50;
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #dee2e6;
            transition: border-color 0.2s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #e74c3c;
            box-shadow: 0 0 0 0.2rem rgba(231, 76, 60, 0.25);
        }
        .btn-submit {
            background-color: #e74c3c;
            border-color: #e74c3c;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-submit:hover {
            background-color: #c0392b;
            border-color: #c0392b;
            transform: translateY(-1px);
        }
    </style>
</head>
<body id="page-top">
<div th:replace="fragments/navbar :: navbar('no', 'no', 'no', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes')"></div>

<div class="container mt-5 pt-5 pb-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card form-card shadow-sm">
                <div class="card-header py-3">
                    <h4 class="mb-0">
                        <i class="fa-solid fa-cart-shopping me-2"></i>
                        Новая трата
                    </h4>
                </div>
                <div class="card-body p-4">

                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form th:action="@{/submitAdd}" th:object="${expense}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Категория</label>
                            <select class="form-select" th:field="*{category}" required>
                                <option value="">Выберите категорию</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.name}"
                                        th:text="${cat.name}">
                                </option>
                            </select>
                            <div class="text-danger" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Счёт</label>
                            <select class="form-select" th:field="*{accountId}" required>
                                <option value="0">Выберите счёт</option>
                                <option th:each="account : ${accounts}"
                                        th:value="${account.id}"
                                        th:text="${account.name + ' (' + #numbers.formatDecimal(account.balance, 1, 2) + ' ' + account.currency + ')'}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Сумма</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{amount}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Дата и время</label>
                            <input type="datetime-local" class="form-control" th:field="*{dateTime}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('dateTime')}" th:errors="*{dateTime}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Описание</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger w-100">
                                <i class="fa-solid fa-plus me-2"></i>Сохранить трату
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
