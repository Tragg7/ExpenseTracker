<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои счета</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body id="page-top">
<div th:replace="fragments/navbar :: navbar('no', 'no', 'no', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes')"></div>

<div class="container mt-3 pt-3">
    <h2 class="text-center mb-5 mt-4">
        Мои счета
    </h2>

    <div class="text-center mb-5">
        <a th:href="@{/accounts/showAdd}"
           class="btn btn-primary shadow-sm">
            <i class="fa-solid fa-plus"></i>
            Добавить счёт
        </a>
    </div>

    <div class="row justify-content-center mb-5">
        <div class="col-12 col-md-8 col-lg-5 text-center">
            <canvas id="accountsChart"></canvas>
            <div class="card mt-4 shadow-sm">
                <div class="card-header">
                    <i class="fa-solid fa-wallet"></i>
                    Общий баланс
                </div>
                <div class="card-body">
                    <h3 th:text="${totalBalanceInRub + ' ₽'}"></h3>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4"
             th:each="account : ${accounts}">
            <div class="card shadow-sm h-100">
                <div class="card-header">
                    <i class="fa-solid fa-building-columns"></i>
                    <span th:text="${account.name}">
                        Название счёта
                    </span>
                </div>
                <div class="card-body">
                    <p class="card-text">
                        <strong>Тип:</strong>
                        <span th:text="${account.type == 'CASH'
                            ? 'Наличные'
                            : (account.type == 'CARD'
                            ? 'Банковская карта'
                            : 'Сберегательный счёт')}">
                        </span>
                    </p>
                    <p class="card-text">
                        <strong>Баланс:</strong>
                        <span class="fw-bold"
                              th:text="${account.balance}">
                        </span>
                        <span th:text="${account.currency}">
                        </span>
                    </p>
                    <p class="card-text" th:if="${account.description != null and !account.description.isEmpty()}">
                        <strong>Описание:</strong>
                        <span th:text="${account.description}">
                        </span>
                    </p>
                </div>
                <div class="card-footer bg-white border-0">
                    <div class="d-flex gap-2">
                        <a th:href="@{/accounts/showUpdate(accountId=${account.id})}"
                           class="btn btn-primary btn-sm flex-fill">
                            <i class="fas fa-edit"></i>
                            Изменить
                        </a>
                        <a th:href="@{/accounts/delete(accountId=${account.id})}"
                           class="btn btn-danger btn-sm flex-fill"
                           onclick="return confirm('Вы уверены, что хотите удалить этот счёт?')">
                            <i class="fas fa-trash"></i>
                            Удалить
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${accounts.isEmpty()}">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <i class="fa-solid fa-wallet fa-3x mb-3"></i>
                <h5 class="mb-3">
                    У вас пока нет счетов
                </h5>
                <a th:href="@{/accounts/showAdd}" class="btn btn-primary">
                    Создать первый счёт
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
