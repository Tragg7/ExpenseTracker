<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
          integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" href="https://unpkg.com/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/bs-brain@2.0.3/components/logins/login-12/assets/css/login-12.css">
    <title>Зарегистрироваться</title>
    <style>
        .error{
            color:red;
            font-size: 13px;
            margin-top:-15px;
        }
    </style>
</head>
<body>

<section class="py-3 py-md-5 py-xl-8">
    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="mb-5">
                    <h2 class="display-5 fw-bold text-center">Регистрация</h2>
                </div>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10 col-xl-8">
                <div class="row gy-5 justify-content-center">
                    <div class="col-12 col-lg-5">
                        <div th:if="${param.userFound}">
                            <div class="alert alert-danger" role="alert">
                                Такой пользователь уже существует
                            </div>
                        </div>
                        <form action="#" th:action="@{/processRegistration}" th:object="${webUser}" method="post">
                            <div class="row gy-3 overflow-hidden">
                                <div class="col-12">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control border-0 border-bottom rounded-0"
                                               id="userName" placeholder="Логин" th:field="*{username}" required>
                                        <label for="userName" class="form-label">Логин</label>
                                    </div>
                                    <div th:if="${#fields.hasErrors('username')}"
                                          th:errors="*{username}"
                                          class="error"></div>
                                </div>
                                <div class="col-12">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control border-0 border-bottom rounded-0"
                                               id="firstname" placeholder="Имя" th:field="*{firstName}" required>
                                        <label for="firstname" class="form-label">Имя</label>
                                    </div>
                                    <div th:if="${#fields.hasErrors('firstName')}"
                                         th:errors="*{firstName}"
                                         class="error"></div>
                                </div>
                                <div class="col-12">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control border-0 border-bottom rounded-0"
                                               id="lastname" placeholder="Фамилия" th:field="*{lastName}" required>
                                        <label for="lastname" class="form-label">Фамилия</label>
                                    </div>
                                    <div th:if="${#fields.hasErrors('lastName')}"
                                         th:errors="*{lastName}"
                                         class="error"></div>
                                </div>
                                <div class="col-12">
                                    <div class="form-floating mb-3">
                                        <input type="email" class="form-control border-0 border-bottom rounded-0"
                                               id="email" placeholder="Почта" th:field="*{email}" required>
                                        <label for="email" class="form-label">Почта</label>
                                    </div>
                                    <div th:if="${#fields.hasErrors('email')}"
                                         th:errors="*{email}"
                                         class="error"></div>
                                </div>
                                <div class="col-12">
                                    <div class="form-floating mb-3">
                                        <input type="password" class="form-control border-0 border-bottom rounded-0"
                                               id="password" value="" placeholder="Пароль" th:field="*{password}" required>
                                        <label for="password" class="form-label">Пароль</label>
                                    </div>
                                    <div th:if="${#fields.hasErrors('password')}"
                                         th:errors="*{password}"
                                         class="error"></div>
                                </div>
                                <div class="col-12">
                                    <div class="d-grid">
                                        <button class="btn btn-lg btn-dark rounded-0 fs-6" type="submit">
                                            Зарегистрироваться
                                        </button>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-12">
                                        <div class="mb-5">
                                            <p class="text-center m-0">Уже есть аккаунт?
                                                <a th:href="@{/showLoginPage}">Войти.</a>
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
