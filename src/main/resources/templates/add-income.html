<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content=""/>
    <meta name="author" content=""/>
    <title>Добавить доход</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css"/>
    <link href="https://fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic" rel="stylesheet"
          type="text/css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body id="page-top">
<div th:replace="fragments/navbar :: navbar('no', 'no', 'no', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes')"></div>
<div class="container mt-3 pt-3">
    <h2 class="text-center mb-5 mt-4">
        Добавить доход
    </h2>
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    <i class="fa-solid fa-wallet"></i>
                    Новый доход
                </div>
                <div class="card-body">
                <form th:action="@{/income/submitAdd}" th:object="${income}" method="post">
                    <div class="form-group">
                        <div class="mb-3">
                            <label class="form-label">
                                Категория
                            </label>
                            <select id="incomeCategory" class="form-select" th:field="*{category}">
                                <option
                                        th:each="cat : ${categories}"
                                        th:value="${cat.name}"
                                        th:text="${cat.name}">
                                </option>
                            </select>
                        </div>
                    </div>
                    <br>

                    <div class="mb-3">
                        <label class="form-label">
                            Сумма
                        </label>
                        <input type="number"
                               step="0.01"
                               class="form-control"
                               id="amount"
                               th:field="*{amount}"
                               required>
                    </div>
                    <br>

                    <div class="mb-3">
                        <label class="form-label">
                            Дата и время
                        </label>
                        <input type="datetime-local"
                               class="form-control"
                               id="dateTime"
                               th:field="*{dateTime}"
                               required>
                    </div>
                    <br>

                    <div class="mb-3">
                        <label class="form-label">
                            Описание
                        </label>

                        <textarea class="form-control" id="description" rows="3" th:field="*{description}">
                        </textarea>
                    </div>
                    <br>

                    <button type="submit" class="btn btn-primary w-100">
                        Сохранить доход
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
