<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перевод между счетами</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-card {
            border-left: 4px solid #3498db;
            border-radius: 12px;
        }
        .form-card .card-header {
            background-color: #ebf5fb;
            border-bottom: 1px solid #d4e6f1;
            color: #2874a6;
        }
        .form-label {
            font-weight: 500;
            color: #2c3e50;
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #dee2e6;
            transition: border-color 0.2s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
        }
        .btn-submit {
            background-color: #3498db;
            border-color: #3498db;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-submit:hover {
            background-color: #2874a6;
            border-color: #2874a6;
            transform: translateY(-1px);
        }
        .transfer-arrow {
            text-align: center;
            font-size: 2rem;
            color: #3498db;
            margin: 10px 0;
        }
    </style>
</head>
<body id="page-top">
<div th:replace="fragments/navbar :: navbar('no', 'no', 'no', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes')"></div>

<div class="container mt-5 pt-4 pb-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card form-card shadow-sm">
                <div class="card-header py-3">
                    <h4 class="mb-0">
                        <i class="fa-solid fa-arrow-right-arrow-left me-2"></i>
                        Перевод между счетами
                    </h4>
                </div>
                <div class="card-body p-4">

                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form th:action="@{/accounts/submitTransfer}" th:object="${transfer}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Со счёта</label>
                            <select class="form-select" th:field="*{fromAccountId}" required>
                                <option value="">Выберите счёт отправителя</option>
                                <option th:each="account : ${accounts}"
                                        th:value="${account.id}"
                                        th:text="${account.name + ' (' + #numbers.formatDecimal(account.balance, 1, 2) + ' ' + account.currency + ')'}">
                                </option>
                            </select>
                        </div>

                        <div class="transfer-arrow">
                            <i class="fa-solid fa-arrow-down"></i>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">На счёт</label>
                            <select class="form-select" th:field="*{toAccountId}" required>
                                <option value="">Выберите счёт получателя</option>
                                <option th:each="account : ${accounts}"
                                        th:value="${account.id}"
                                        th:text="${account.name + ' (' + #numbers.formatDecimal(account.balance, 1, 2) + ' ' + account.currency + ')'}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Сумма</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{amount}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Дата и время</label>
                            <input type="datetime-local" class="form-control" th:field="*{dateTime}">
                            <small class="text-muted">Оставьте пустым для использования текущего времени</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Описание (необязательно)</label>
                            <textarea class="form-control" th:field="*{description}" rows="2"></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-submit text-white">
                                <i class="fa-solid fa-paper-plane me-2"></i>Выполнить перевод
                            </button>
                            <a th:href="@{/accounts/list}" class="btn btn-outline-secondary">
                                <i class="fa-solid fa-arrow-left me-2"></i>Отмена
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
