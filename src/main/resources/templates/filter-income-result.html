<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Фильтрация доходов</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .hash {
            color: #008000;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body id="page-top">
<div th:replace="~{fragments/navbar :: navbar('no', 'no', 'no', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes', 'yes')}"></div>

<section class="page-section mb-0 portfolio" id="about">
    <div class="container">
        <h4 class="page-section-heading text-center text-uppercase" style="margin-top: 30px;">Результат фильтрации доходов</h4>
        <div class="divider-custom divider-dark">
            <div class="divider-custom-line"></div>
            <div class="divider-custom-icon"><i class="fas fa-star"></i></div>
            <div class="divider-custom-line"></div>
        </div>
        <div class="row">
            <div class="col-12 col-sm-6 col-lg-4 py-2" th:each="inc : ${incomeList}">
                <div class="card h-100 border-success">
                    <div class="card-body">
                        <span class="hash">Категория: </span>
                        <span class="card-text" th:text="${inc.categoryName}"></span><br>
                        <span class="hash">Стоимость: </span>
                        <span class="card-text" th:text="${inc.amount}"></span> ₽<br>
                        <span class="hash">Дата: </span>
                        <span class="card-text" th:text="${inc.date}"></span><br>
                        <span class="hash">Время: </span>
                        <span class="card-text" th:text="${inc.time}"></span><br>
                        <span class="hash">Описание: </span>
                        <span class="card-text" th:text="${inc.description}"></span><br>
                        <div class="text-center" style="margin-top:28px;">
                            <a th:href="@{/income/showUpdate(incId=${inc.id})}" class="btn btn-info border-light"
                               style="background: #1abc9c; color: white;">Обновить</a>
                            <a th:href="@{/income/delete(incId=${inc.id})}" class="btn btn-danger"
                               onclick="if(!(confirm('Вы уверены что хотите удалить доход?'))) return false">Удалить</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
