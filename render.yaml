services:
  - type: web
    name: expense-tracker
    env: docker
    region: frankfurt
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expense-tracker-db
          property: connectionString
      - key: DATABASE_USER
        fromDatabase:
          name: expense-tracker-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: expense-tracker-db
          property: password

databases:
  - name: expense-tracker-db
    databaseName: expensetracker
    user: expenseuser
    plan: free